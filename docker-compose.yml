services:
  postgres:
    image: postgres:16-alpine
    container_name: clickly-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clickly
      POSTGRES_PASSWORD: clickly_dev_2026
      POSTGRES_DB: clickly
    ports:
      - "5432:5432"
    volumes:
      - clickly_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: clickly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - clickly_redis:/data

volumes:
  clickly_pgdata:
  clickly_redis:
